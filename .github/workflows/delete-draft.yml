name: Delete draft release

# Maintenance: remove an abandoned DRAFT release by its tag_name (e.g. a
# draft for a version that was renumbered before ever shipping). Deliberately
# refuses to touch published releases — only drafts match the filter. Logs
# each draft's assets and their download counts before deleting, so there is
# a record of whether anything was ever pulled from it.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'tag_name of the DRAFT release to delete'
        required: true
        type: string

jobs:
  delete:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete draft release(s) with this tag_name
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # env indirection: never interpolate the expression into shell
          # source, so the value can't be parsed as script
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="$TAG"
          found=0
          for id in $(gh api "repos/$GITHUB_REPOSITORY/releases" --paginate \
                        --jq ".[] | select(.draft == true and .tag_name == \"$tag\") | .id"); do
            found=1
            echo "Draft release $id (tag_name $tag) — assets and download counts before deletion:"
            gh api "repos/$GITHUB_REPOSITORY/releases/$id" \
              --jq '.assets[] | "  \(.name)  (\(.download_count) downloads)"' || echo "  (no assets)"
            gh api -X DELETE "repos/$GITHUB_REPOSITORY/releases/$id"
            echo "Deleted draft $id."
          done
          if [ "$found" = "0" ]; then
            echo "No draft release with tag_name '$tag' found — nothing to do."
          fi
