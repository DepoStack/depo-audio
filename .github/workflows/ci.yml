name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint, tokens, tests, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Design tokens are in sync
        run: |
          npm run tokens
          git diff --exit-code src/styles/tokens.css || {
            echo '::error::src/styles/tokens.css is stale — run `npm run tokens` and commit the result'
            exit 1
          }

      - name: Characterization + unit tests
        run: npm test

      - name: Build
        run: npm run build

  rust:
    name: Rust (clippy, tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev \
            build-essential pkg-config libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Clippy (no warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Characterization + unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
